# labeled.yaml — the labeled writing-rules corpus (inert fixture data)
#
# Each item is one short requirement-prose span paired with its ground-truth label. The
# label is either `clean` (nothing should fire) or the single `SOL-Pxxx` code from the
# checks catalogue (docs/reference/checks.md) that should fire, with the reason. Nothing
# here runs: this is the gold set a writing-rules detector — swarm-cli's
# `swarm spec check`, or a human reviewer — is scored against to compute the
# precision/recall baseline in ./README.md.
#
# Field meaning:
#   id       stable item id (P-NNN), unique within this file.
#   text     the prose span under judgment (the requirement clause or commentary line).
#   context  binding | commentary. The force of every writing rule depends on this: a span
#            is binding inside a requirement/constraint/invariant, commentary elsewhere.
#   label    clean | <SOL-Pxxx>. The expected outcome.
#   expect   the exact code a correct detector fires (none on a clean span).
#   severity blocking | advisory | none — this corpus's recording of the catalogue's
#            hard-error | warning split for the code.
#   reason   why this label is correct — hand-checkable, written to a Cohen's k >= 0.6
#            inter-annotator floor (a second reviewer should assign the same label from
#            the reason alone).
#
# Near-miss twins are paired on purpose: a problem span and its clean fix differ only by
# the same-line observable criterion, so a detector that confuses them is caught.

items:

  # --- SOL-P005: vague-quality / high-risk word, no same-line observable criterion ---

  - id: P-001
    text: "THE service MUST handle failures gracefully"
    context: binding
    label: SOL-P005
    expect: SOL-P005
    severity: blocking
    reason: >-
      "handle" is a vague action verb and "gracefully" a non-verifiable quality word; the
      binding clause supplies no actor+action+object, no threshold, and no verification
      target on the same line, so what gets built is underdetermined.

  - id: P-002
    text: >-
      WHEN the payment provider times out THE server MUST record a retryable payment
      attempt AND THE client MUST show "Payment temporarily unavailable"
    context: binding
    label: clean
    expect: none
    severity: none
    reason: >-
      The clean twin of P-001: every clause is an observable actor+action+object pair
      (server records, client shows a named string). No high-risk word survives unbacked.

  - id: P-003
    text: "THE search endpoint MUST be fast"
    context: binding
    label: SOL-P005
    expect: SOL-P005
    severity: blocking
    reason: >-
      "fast" is a non-verifiable quality word in a binding clause with no measurable
      threshold on the same line; the QUANTIFY repair would supply a latency bound.

  - id: P-004
    text: >-
      WHEN the index holds <= 1,000,000 rows THE search endpoint MUST return results within
      a 200 ms p95 latency
    context: binding
    label: clean
    expect: none
    severity: none
    reason: >-
      The clean twin of P-003: the quality "fast" is replaced by a measurable threshold
      (200 ms p95) with units and a scope bound, satisfying the same-line-observable rule.

  - id: P-005
    text: "THE client MUST retry the charge as far as possible"
    context: binding
    label: SOL-P005
    expect: SOL-P005
    severity: blocking
    reason: >-
      "as far as possible" is a loophole phrase: it leaves the retry bound undefined, so
      the obligation has no observable stopping criterion. CONCRETIZE supplies a count.

  - id: P-006
    text: "## Context\nThe existing auth flow is messy and users see repeated failed refresh calls."
    context: commentary
    label: clean
    expect: none
    severity: none
    reason: >-
      "messy" is a high-risk word but the span is COMMENTARY (a ## Context section, not a
      REQ/CONSTRAINT/INVARIANT body). High-risk-word rules fire only inside binding clauses,
      so no SOL-P005 here — commentary may be loose because it only explains.

  - id: P-007
    text: "THE service MUST keep the cart total consistent"
    context: binding
    label: SOL-P005
    expect: SOL-P005
    severity: blocking
    reason: >-
      "consistent" is a non-verifiable quality word with no same-line definition of what
      consistency is measured against; underdetermined in a binding clause.

  # --- SOL-P004: bundled / overloaded obligation (ambiguous connective) ---

  - id: P-008
    text: "THE service MUST validate the cart AND charge the card AND email the receipt"
    context: binding
    label: SOL-P004
    expect: SOL-P004
    severity: blocking
    reason: >-
      Three separable obligations bundled into one clause by "AND". Each needs its own id,
      modality, and verification binding; ATOMIZE splits into one obligation per block.

  - id: P-009
    text: "THE service MUST validate the cart before submission"
    context: binding
    label: clean
    expect: none
    severity: none
    reason: >-
      The de-bundled twin of P-008: a single atomic obligation, one actor, one action,
      one verifiable response. The other two obligations live in their own blocks.

  # --- SOL-P056: comparative / superlative without a baseline (blocking in a binding clause) ---

  - id: P-010
    text: "THE new endpoint MUST be faster than the old one"
    context: binding
    label: SOL-P056
    expect: SOL-P056
    severity: blocking
    reason: >-
      "faster" is a comparative with no quantified baseline. In a binding clause SOL-P056
      is promoted to BLOCKING; QUANTIFY supplies the baseline (e.g. the prior p95 latency).

  - id: P-011
    text: "This pass should make the planner more efficient overall."
    context: commentary
    label: SOL-P056
    expect: SOL-P056
    severity: advisory
    reason: >-
      "more efficient" is an unbaselined comparative, but the span is COMMENTARY, so
      SOL-P056 fires at its default ADVISORY severity, not BLOCKING — same code, lower force.

  # --- SOL-P002: missing actor ---

  - id: P-012
    text: "WHEN a 401 is returned MUST refresh the token once before retrying"
    context: binding
    label: SOL-P002
    expect: SOL-P002
    severity: blocking
    reason: >-
      The modal MUST has no responsible actor — there is no "THE <actor>" naming who
      refreshes. CONCRETIZE names the actor (e.g. THE auth client).

  # --- SOL-P003: missing / informal modality ---

  - id: P-013
    text: "WHEN the session expires the client should redirect to /login"
    context: binding
    label: SOL-P003
    expect: SOL-P003
    severity: blocking
    reason: >-
      Lowercase "should" used where binding force is intended; informal modality. NORMALIZE
      uppercases it to the correct modal (SHOULD, or MUST if the redirect is mandatory).

  # --- SOL-P007: negation ambiguity (bare MUST NOT, no paired affirmative) ---

  - id: P-014
    text: "THE server MUST NOT create an order"
    context: binding
    label: SOL-P007
    expect: SOL-P007
    severity: blocking
    reason: >-
      A bare prohibition with no paired affirmative behavior: it says what not to do but
      leaves what the server does instead undetermined. CLARIFY states the affirmative.

  - id: P-015
    text: >-
      WHEN the payment provider times out THE server MUST NOT create an order AND THE server
      MUST record a retryable payment attempt
    context: binding
    label: clean
    expect: none
    severity: none
    reason: >-
      The clean twin of P-014: the prohibition is paired with the affirmative behavior
      (record a retryable attempt), so the actor's response is fully determined.

  # --- SOL-P008: uncaptured behavioral uncertainty left in prose ---

  - id: P-016
    text: >-
      It is unclear whether an expired refresh token should redirect to /login or open an
      inline re-auth modal; we will decide later.
    context: commentary
    label: SOL-P008
    expect: SOL-P008
    severity: blocking
    reason: >-
      A behavioral ambiguity left buried in prose instead of lifted to a QUESTION block.
      CLARIFY raises a QUESTION so the gap blocks lowering rather than silently lowering.

  # --- SOL-P050: pronoun / vague reference (advisory) ---

  - id: P-017
    text: "WHEN it fails THE client MUST retry it"
    context: binding
    label: SOL-P050
    expect: SOL-P050
    severity: advisory
    reason: >-
      "it" has no unique antecedent (the request? the refresh? the charge?). Advisory
      SOL-P050 unless the pronoun hides the actor entirely (then SOL-P002). CONCRETIZE names it.

  # --- additional clean anchors (precision: nothing should fire) ---

  - id: P-018
    text: >-
      WHEN a request returns 401 AND a refresh token is present THE auth client MUST call
      refreshSession once
    context: binding
    label: clean
    expect: none
    severity: none
    reason: >-
      Fully conformant: explicit trigger, named actor, MUST modal, observable action with a
      "once" bound. No high-risk word, no bundling, no missing actor. Must not be flagged.

  - id: P-019
    text: "INVARIANT the retry count for a single original request MUST NOT exceed 1"
    context: binding
    label: clean
    expect: none
    severity: none
    reason: >-
      A bounded invariant with a literal numeric threshold (1) and a named measured quantity
      (retry count per original request). The MUST NOT is paired with a measurable bound, so
      it is not the bare-prohibition SOL-P007. Must not be flagged.

  - id: P-020
    text: "BECAUSE an unbounded retry loop would drain the auth service"
    context: commentary
    label: clean
    expect: none
    severity: none
    reason: >-
      A BECAUSE rationale clause is COMMENTARY by the binding boundary; it records why,
      durably, and carries no obligation. No SOL-P code applies to a well-formed rationale.
