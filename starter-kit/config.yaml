# .agents/swarm.config.yaml — the adopted project's Swarm configuration (optional).
#
# PROJECT-OWNED. Lives at .agents/swarm.config.yaml — there is no .swarm/ mount
# (ADR-0049/0050); it is not part of the re-copied starter kit, so an upgrade never
# touches it. NO RUNTIME: inert data a future toolchain reads; nothing here executes.
#
# Three sections, each a fixed contract:
#   surfaces:  the per-path source-code surface-policy map  (the "surface policies" model)
#   agents:    the agent-CLI worker adapters                (the worker-adapter contract)
#   lint:      severity overrides + waivers                 (schema swarm.config/0.1; codes in the SOL error catalogue)

language: SOL/0.1            # the language version this project's specs speak

# --- surfaces: the source-code surface-policy map ---------------------------
# Each path declares EXACTLY ONE policy from the closed set of five:
#   governed   — reconciled reality under an obligation (edits allowed only with an obligation trace)
#   generated  — regenerated from a named source artifact (a hand-edit is overwritten and is a finding)
#   observed   — pre-existing reality, no obligation yet (the brownfield honest default; an audit + a spec promote it to governed)
#   external   — vendor / third-party (do not modify; changes go upstream or in an owned wrapper)
#   deprecated — scheduled for removal / migration
# Shape: <path> -> { policy, source, manual_edits } (+ policy-specific fields, e.g. requires_audit).
# Computing/enforcing the map is a future-tool concern; the map SHAPE is the contract today.
# Seeded empty — on a fresh adoption, existing code is `observed` until audited.
surfaces: {}
  # Example (delete or adapt):
  # "src/api/generated/**":
  #   policy: generated
  #   source: specs/interfaces/openapi.yaml
  #   manual_edits: forbidden

# --- agents: the worker adapters a future toolchain would drive -------------
# A documented record, NOT a running process this repo ships. Each adapter aims a
# worker at AGENTS.md + its generated task frame, in the task's own worktree.
# The defaults below work out of the box; add/remove agents to match your team's CLIs.
agents:
  claude:
    command: claude
    working_directory: task_worktree   # one worktree <-> one task
    startup_instruction: "Read AGENTS.md, then read the Swarm task file."
  codex:
    command: codex
    working_directory: task_worktree
    startup_instruction: "Read AGENTS.md, then read the Swarm task file."

# --- lint: severity overrides + waivers (schema swarm.config/0.1) -----------
# Exactly two legal moves (see the SOL error catalogue):
#   1. PROMOTE an ADVISORY code to `error` (strict mode) — no record needed.
#   2. DEMOTE a BLOCKING code to `warning`|`off` — ONLY with a complete waiver record.
# A swarm.config MUST NOT redefine / rename / invent / re-layer codes, or change a code's layer.
lint:
  severity_overrides: {}
    # SOL-P052: error    # strict: promote an advisory code -> error
  waivers: []
    # - code: SOL-V001
    #   scope: AC-014                  # a code applies repo-wide; an obligation id / glob narrows it
    #   to: warning                    # warning | off
    #   authority: spec-owner:<name>   # a human or the spec owner
    #   reason: "<why; the manual check that tracks it>"
    #   expiry: 2026-07-01             # ISO date; auto-expires (also on the obligation's content-hash change)
    #   recorded_at: 2026-06-05
